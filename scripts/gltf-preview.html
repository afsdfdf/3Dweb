<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body, #app { margin: 0; width: 100%; height: 100%; background: #0b1020; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.183.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.183.2/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="app"></div>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
  const params = new URLSearchParams(location.search);
  const src = params.get('src');
  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.getElementById('app').appendChild(renderer.domElement);
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#0b1020');
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(2.5, 1.8, 3.5);
  const hemi = new THREE.HemisphereLight(0xffffff, 0x223344, 2.2);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 3);
  dir.position.set(4, 6, 5);
  scene.add(dir);
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  const floor = new THREE.Mesh(
    new THREE.CircleGeometry(3.5, 64),
    new THREE.MeshStandardMaterial({ color: '#11192d', roughness: 0.95, metalness: 0.05 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1.15;
  scene.add(floor);
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://unpkg.com/three@0.183.2/examples/jsm/libs/draco/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);
  loader.load(src, (gltf) => {
    const root = gltf.scene;
    root.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(root);
    const box = new THREE.Box3().setFromObject(root);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    root.position.sub(center);
    root.position.y -= box.min.y;
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    const fitDist = maxDim * 1.8;
    camera.position.set(fitDist * 0.75, fitDist * 0.55, fitDist);
    camera.lookAt(0, maxDim * 0.35, 0);
    renderer.render(scene, camera);
    window.__RENDER_DONE__ = true;
  }, undefined, (err) => {
    console.error(err);
    window.__RENDER_DONE__ = 'error';
  });
</script>
</body>
</html>
